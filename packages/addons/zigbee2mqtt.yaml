zigbee2mqtt_package:
  mqtt:
    sensor:
      # Sensor for monitoring the bridge state
      - name: Zigbee2MQTT Bridge state
        state_topic: "zigbee2mqtt/bridge/state"
        icon: mdi:router-wireless
      # Sensor for Showing the Zigbee2MQTT Version
      - name: Zigbee2MQTT Version
        state_topic: "zigbee2mqtt/bridge/config"
        value_template: "{{ value_json.version }}"
        icon: mdi:zigbee
      # Sensor for Showing the Coordinator Version
      - name: Coordinator Version
        state_topic: "zigbee2mqtt/bridge/config"
        value_template: "{{ value_json.coordinator }}"
        icon: mdi:chip

  input_boolean:
    food_waste_machine_state:
      name: Food waste machine state
    dish_washer_state:
      name: Dish washer state

  # Rice cooker: 0x5c0272fffea01608
  # Dish washer: 0x00158d0004f66a8b
  # Tree Light: 0x5c0272fffea010ce
  # Food waste machine: 0x00158d0004f66c2c
  # Fan: 0x5c0272fffea014af
  # Bidet: 0x5c0272fffea01164
  template:
    - sensor:
      - default_entity_id: sensor.rice_cooker_monthly_energy_last_month
        name: "밥솥 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.rice_cooker_monthly_energy','last_period')|float }}"
      - default_entity_id: sensor.food_waste_machine_monthly_energy_last_month
        name: "음식물처리기 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.food_waste_machine_monthly_energy','last_period')|float }}"
      - default_entity_id: sensor.dishwasher_monthly_energy_last_month
        name: "식기세척기 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.dishwasher_monthly_energy','last_period')|float }}"
      - default_entity_id: sensor.bidet_monthly_energy_last_month
        name: "비데 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.bidet_monthly_energy','last_period')|float }}"
      - default_entity_id: sensor.fan_monthly_energy_last_month
        name: "써큘레이터 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.fan_monthly_energy','last_period')|float }}"
      - default_entity_id: sensor.tree_light_monthly_energy_last_month
        name: "트리 조명 전력 전월 사용량"
        unit_of_measurement: kWh
        state: "{{ state_attr('sensor.tree_light_monthly_energy','last_period')|float }}"

  utility_meter:
    rice_cooker_monthly_energy:
      source: sensor.0x5c0272fffea01608_energy
      cycle: monthly
    food_waste_machine_monthly_energy:
      source: sensor.0x00158d0004f66c2c_energy
      cycle: monthly
    dishwasher_monthly_energy:
      source: sensor.0x00158d0004f66a8b_energy
      cycle: monthly
    bidet_monthly_energy:
      source: sensor.0x5c0272fffea01164_energy
      cycle: monthly
    fan_monthly_energy:
      source: sensor.0x5c0272fffea014af_energy
      cycle: monthly
    tree_light_monthly_energy:
      source: sensor.0x5c0272fffea010ce_energy
      cycle: monthly

  automation:
    - id: "zigbee2mqtt_create_notification_on_successfull_interview"
      alias: Zigbee Device Joined Notification
      trigger:
        platform: mqtt
        topic: "zigbee2mqtt/bridge/event"
      condition:
        condition: template
        value_template: '{{trigger.payload_json.type == "device_interview" and trigger.payload_json.data.status == "successful" and trigger.payload_json.data.supported}}'
      action:
        - service: telegram_bot.send_message
          data_template:
            title: "👏 Zigbee2MQTT 새로운 Zigbee 장비가 연결되었습니다"
            message: "이름: {{trigger.payload_json.data.friendly_name}},
              벤더: {{trigger.payload_json.data.definition.vendor}},
              모델: {{trigger.payload_json.data.definition.model}},
              상세설명: {{trigger.payload_json.data.definition.description}}"
