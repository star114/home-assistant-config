# Send notification if new Home Assistant release
# https://www.home-assistant.io/cookbook/notify_if__new_ha_release/
updater_package:
  automation:
    - id: "ha_core_update_notification"
      alias: "HA Core Update notification"
      trigger:
        - platform: state
          entity_id: update.home_assistant_core_update
          from: "off"
          to: "on"
      action:
        - service: telegram_bot.send_message
          data:
            title: "🆕 새로운 Home Assistant Core 업데이트 알림"
            message: "Home Assistant Core {{ state_attr('update.home_assistant_core_update', 'latest_version') }} 으로 업데이트 하세요"
    - id: "hacs_update_notification"
      alias: "HACS Update notification"
      trigger:
        - platform: state
          entity_id: update.hacs_update
          from: "off"
          to: "on"
      action:
        - service: telegram_bot.send_message
          data:
            title: "🆕 새로운 HACS 업데이트 알림"
            message: "HACS 업데이트가 있습니다"
