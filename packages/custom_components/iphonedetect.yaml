iphonedetect_package:
  input_boolean:
    heesik_out_check:
      name: Heesik out check
    seojin_out_check:
      name: Seojin out check
  automation:
    - id: "notify_my_presence"
      alias: "Notify my presence"
      trigger:
        - platform: state
          entity_id: device_tracker.heesikiphone_2
          from: "not_home"
          to: "home"
      condition:
        - condition: state
          entity_id: input_boolean.heesik_out_check
          state: "on"
      action:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.heesik_out_check
        - service: telegram_bot.send_message
          data:
            message: "🏡 희식님께서 집에 도착하셨습니다"
        - service: notify.in_the_library
          data:
            message: "희식님, 어서오세요."
    - id: "notify_my_absence"
      alias: "Notify my absence"
      trigger:
        - platform: state
          entity_id: device_tracker.heesikiphone_2
          from: "home"
          to: "not_home"
          for: "00:05:00"
      action:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.heesik_out_check
        - service: telegram_bot.send_message
          data:
            message: "🏡 희식님께서 외출하셨습니다"
    - id: "notify_seo_presence"
      alias: "Notify seo's presence"
      trigger:
        - platform: state
          entity_id: device_tracker.seojiniphone_2
          from: "not_home"
          to: "home"
      condition:
        - condition: state
          entity_id: input_boolean.seojin_out_check
          state: "on"
      action:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.seojin_out_check
        - service: telegram_bot.send_message
          data:
            message: "🏡 서진님께서 집에 도착하셨습니다"
        - service: notify.in_the_library
          data:
            message: "서진님, 어서오세요."
    - id: "notify_seo_absence"
      alias: "Notify seo's absence"
      trigger:
        - platform: state
          entity_id: device_tracker.seojiniphone_2
          from: "home"
          to: "not_home"
          for: "00:05:00"
      action:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.seojin_out_check
        - service: telegram_bot.send_message
          data:
            message: "🏡 서진님께서 외출하셨습니다"
